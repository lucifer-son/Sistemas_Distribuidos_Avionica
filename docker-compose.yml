services:
  postgres:
    image: postgres:17-alpine
    container_name: avionica_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avionica}
      POSTGRES_USER: ${POSTGRES_USER:-avionica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avionica_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avionica} -d ${POSTGRES_DB:-avionica}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.1.1
    container_name: avionica_kafka
    environment:
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_TOOLS_LOG4J_LOGLEVEL: WARN
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  kafka-topic-init:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_kafka_topic_init
    command: python kafka_create_topics.py
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka

  mqtt-kafka-bridge:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_mqtt_kafka_bridge
    command: python mqtt_kafka_bridge.py
    environment:
      PYTHONUNBUFFERED: "1"
      MQTT_BROKER: mqtt-broker
      MQTT_PORT: 1883
      MQTT_TOPIC_FILTER: avionica/#
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - mqtt-broker
      - kafka
      - kafka-topic-init

  kafka-telemetry-consumer:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_kafka_telemetry_consumer
    command: python kafka_telemetry_consumer.py
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
      - kafka-topic-init


  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: avionica_mqtt_broker
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  backend-gateway:
    build:
      context: ./backend
    container_name: avionica_backend_gateway
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/avionica}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-avionica}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-avionica_dev}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      LAMPORT_GROUP_ID: lamport-consumer
      MQTT_BROKER_URL: tcp://mqtt-broker:1883
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      mqtt-broker:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: avionica_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend-gateway

  fms-api:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_fms_api
    command: python fms_distribuido.py
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: ignore::DeprecationWarning
      MQTT_BROKER: ${MQTT_BROKER:-mqtt-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
      FMS_API_KEY: ${FMS_API_KEY:-}
      FMS_CACHE_DB: /app/data/fms_cache.db
    depends_on:
      - mqtt-broker
    volumes:
      - fms_cache:/app/data

  sensor-flight:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_sensor_flight
    command: python sensores_voo.py
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: ignore::DeprecationWarning
      MQTT_BROKER: ${MQTT_BROKER:-mqtt-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
    depends_on:
      - mqtt-broker

  sensor-brake:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_sensor_brake
    command: python sensor_freio.py
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: ignore::DeprecationWarning
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BRAKE_NODE_ID: 1
      MUTEX_PEERS: 2,3
      BRAKE_TELEMETRY_TOPIC: avionica.telemetry.brakes
      BRAKE_MUTEX_REQUEST_TOPIC: avionica.mutex.brakes.request
      BRAKE_MUTEX_GRANT_TOPIC: avionica.mutex.brakes.grant
      BRAKE_MUTEX_RELEASE_TOPIC: avionica.mutex.brakes.release
    depends_on:
      - kafka
      - kafka-topic-init

  radar:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_radar
    command: python radar_externo.py
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: ignore::DeprecationWarning
      MQTT_BROKER: ${MQTT_BROKER:-mqtt-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
    depends_on:
      - mqtt-broker

  navigation-computer:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_navigation_computer
    command: python computador_navegacao.py
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: ignore::DeprecationWarning
      MQTT_BROKER: ${MQTT_BROKER:-mqtt-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
    depends_on:
      - mqtt-broker

  automation-computer:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_automation_computer
    command: python computador_automacao.py
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: ignore::DeprecationWarning
      MQTT_BROKER: ${MQTT_BROKER:-mqtt-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
    depends_on:
      - mqtt-broker
      - radar

  waic-leader:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_waic_leader
    command: python lider_waic.py
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: ignore::DeprecationWarning
      MQTT_BROKER: ${MQTT_BROKER:-mqtt-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
    depends_on:
      - mqtt-broker

  motor-a:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_motor_a
    command: python motor.py
    environment:
      PYTHONUNBUFFERED: "1"
      MOTOR_ID: a
      KAFKA_BROKER: kafka:9092
    depends_on:
      - kafka
      - kafka-topic-init

  motor-b:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_motor_b
    command: python motor.py
    environment:
      PYTHONUNBUFFERED: "1"
      MOTOR_ID: b
      KAFKA_BROKER: kafka:9092
    depends_on:
      - kafka
      - kafka-topic-init

  motor-c:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_motor_c
    command: python motor.py
    environment:
      PYTHONUNBUFFERED: "1"
      MOTOR_ID: c
      KAFKA_BROKER: kafka:9092
    depends_on:
      - kafka
      - kafka-topic-init

  injetor-kafka:
    build:
      context: ./Software_Aviao
      dockerfile: docker/Dockerfile
    container_name: avionica_injetor_kafka
    command: python injetor_kafka.py
    tty: true
    stdin_open: true
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BROKER: kafka:9092
    depends_on:
      - kafka
      - kafka-topic-init

  db-visualizer:
    build:
      context: ./db-visualizer
    container_name: avionica_db_visualizer
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: avionica
      DB_USER: avionica
      DB_PASS: avionica_dev
    depends_on:
      postgres:
        condition: service_healthy

  kafka-stream-gateway:
    build:
      context: ./backend
      dockerfile: kafka-stream-gateway/Dockerfile
    container_name: avionica_kafka_stream_gateway
    environment:
      SERVER_PORT: 9000
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "9000:9000"
    depends_on:
      - kafka

  aerocontrol-dispatcher:
    build:
      context: ./backend
      dockerfile: aerocontrol-dispatcher/Dockerfile
    container_name: avionica_aerocontrol_dispatcher
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/avionica
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-avionica}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-avionica_dev}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  postgres_data:
  frontend_node_modules:
  fms_cache:
