<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#F3F4F6"/>

  <!-- Sidebar -->
  <rect width="240" height="800" fill="#111827"/>
  <text x="30" y="50" font-family="Inter, Arial" font-size="20" font-weight="bold" fill="white">SkyNet Avionics</text>
  <text x="45" y="125" font-family="Inter, Arial" font-size="14" fill="#9CA3AF">Dashboard</text>
  <text x="45" y="175" font-family="Inter, Arial" font-size="14" fill="#9CA3AF">Flight Management</text>
  <rect x="15" y="200" width="210" height="40" rx="6" fill="#1F2937"/>
  <text x="45" y="225" font-family="Inter, Arial" font-size="14" fill="white">System Health</text>

  <!-- Top Header -->
  <rect x="240" width="960" height="64" fill="white" stroke="#E5E7EB"/>
  <text x="270" y="38" font-family="Inter, Arial" font-size="18" font-weight="600" fill="#111827">System Health &amp; Diagnostics</text>

  <!-- Cluster Overview -->
  <rect x="270" y="90" width="900" height="120" rx="12" fill="white" stroke="#E5E7EB"/>
  <text x="295" y="125" font-family="Inter, Arial" font-size="16" font-weight="600" fill="#111827">Cluster Health Overview</text>
  
  <rect x="295" y="145" width="200" height="45" rx="8" fill="#F0FDF4"/>
  <text x="310" y="172" font-family="Inter, Arial" font-size="14" font-weight="600" fill="#166534">18 Nodes Active</text>

  <rect x="515" y="145" width="200" height="45" rx="8" fill="#FEF2F2"/>
  <text x="530" y="172" font-family="Inter, Arial" font-size="14" font-weight="600" fill="#991B1B">2 Nodes Warning</text>

  <rect x="735" y="145" width="200" height="45" rx="8" fill="#EFF6FF"/>
  <text x="750" y="172" font-family="Inter, Arial" font-size="14" font-weight="600" fill="#1E40AF">Avg Latency: 12ms</text>

  <!-- Service List Table -->
  <rect x="270" y="235" width="600" height="535" rx="12" fill="white" stroke="#E5E7EB"/>
  <text x="295" y="270" font-family="Inter, Arial" font-size="16" font-weight="600" fill="#111827">Service Monitoring</text>
  
  <rect x="295" y="295" width="550" height="40" fill="#F9FAFB"/>
  <text x="310" y="320" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#4B5563">Service Name</text>
  <text x="450" y="320" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#4B5563">Type</text>
  <text x="550" y="320" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#4B5563">Status</text>

  <!-- Row 1 -->
  <text x="310" y="355" font-family="Inter, Arial" font-size="13" fill="#111827">Backend Gateway</text>
  <text x="450" y="355" font-family="Inter, Arial" font-size="13" fill="#6B7280">Java/Spring</text>
  <rect x="550" y="340" width="70" height="20" rx="10" fill="#DEF7EC"/>
  <text x="562" y="355" font-family="Inter, Arial" font-size="11" font-weight="bold" fill="#03543F">Running</text>

  <!-- Row 2 -->
  <text x="310" y="385" font-family="Inter, Arial" font-size="13" fill="#111827">FMS API</text>
  <text x="450" y="385" font-family="Inter, Arial" font-size="13" fill="#6B7280">Python/FastAPI</text>
  <rect x="550" y="370" width="70" height="20" rx="10" fill="#DEF7EC"/>
  <text x="562" y="385" font-family="Inter, Arial" font-size="11" font-weight="bold" fill="#03543F">Running</text>

  <!-- Row 3 -->
  <text x="310" y="415" font-family="Inter, Arial" font-size="13" fill="#111827">Radar Service</text>
  <text x="450" y="415" font-family="Inter, Arial" font-size="13" fill="#6B7280">Python</text>
  <rect x="550" y="400" width="70" height="20" rx="10" fill="#FEF2F2"/>
  <text x="565" y="415" font-family="Inter, Arial" font-size="11" font-weight="bold" fill="#991B1B">Failed</text>

  <!-- Metrics Sidebar -->
  <rect x="890" y="235" width="280" height="535" rx="12" fill="white" stroke="#E5E7EB"/>
  <text x="910" y="270" font-family="Inter, Arial" font-size="16" font-weight="600" fill="#111827">Infrastructure</text>
  
  <text x="910" y="305" font-family="Inter, Arial" font-size="14" fill="#374151">Kafka Broker</text>
  <text x="1100" y="305" font-family="Inter, Arial" font-size="14" font-weight="bold" fill="#10B981">Healthy</text>
  <rect x="910" y="315" width="240" height="4" rx="2" fill="#E5E7EB"/>
  <rect x="910" y="315" width="230" height="4" rx="2" fill="#10B981"/>

  <text x="910" y="355" font-family="Inter, Arial" font-size="14" fill="#374151">PostgreSQL DB</text>
  <text x="1100" y="355" font-family="Inter, Arial" font-size="14" font-weight="bold" fill="#10B981">Healthy</text>
  <rect x="910" y="365" width="240" height="4" rx="2" fill="#E5E7EB"/>
  <rect x="910" y="365" width="220" height="4" rx="2" fill="#10B981"/>

  <text x="910" y="415" font-family="Inter, Arial" font-size="16" font-weight="600" fill="#111827">Resource Usage</text>
  <text x="910" y="450" font-family="Inter, Arial" font-size="12" fill="#6B7280">Bus Throughput (MB/s)</text>
  <path d="M 910 520 L 930 500 L 950 510 L 970 480 L 990 490 L 1010 460 L 1030 470 L 1150 450" stroke="#3B82F6" stroke-width="2" fill="none"/>
  
  <text x="910" y="560" font-family="Inter, Arial" font-size="12" fill="#6B7280">Database Latency (ms)</text>
  <path d="M 910 630 L 950 610 L 1000 620 L 1150 590" stroke="#8B5CF6" stroke-width="2" fill="none"/>

</svg>
