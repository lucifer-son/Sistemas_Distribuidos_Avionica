<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#F3F4F6"/>

  <!-- Sidebar -->
  <rect width="240" height="800" fill="#111827"/>
  <text x="30" y="50" font-family="Inter, Arial" font-size="20" font-weight="bold" fill="white">SkyNet Avionics</text>
  
  <rect x="15" y="100" width="210" height="40" rx="6" fill="#1F2937"/>
  <text x="45" y="125" font-family="Inter, Arial" font-size="14" fill="white">Dashboard</text>
  
  <text x="45" y="175" font-family="Inter, Arial" font-size="14" fill="#9CA3AF">Flight Management</text>
  <text x="45" y="225" font-family="Inter, Arial" font-size="14" fill="#9CA3AF">System Health</text>
  <text x="45" y="275" font-family="Inter, Arial" font-size="14" fill="#9CA3AF">Telemetry Logs</text>
  <text x="45" y="325" font-family="Inter, Arial" font-size="14" fill="#9CA3AF">Settings</text>

  <!-- Top Header -->
  <rect x="240" width="960" height="64" fill="white" stroke="#E5E7EB"/>
  <text x="270" y="38" font-family="Inter, Arial" font-size="18" font-weight="600" fill="#111827">Flight Overview</text>
  <rect x="1050" y="17" width="120" height="30" rx="15" fill="#DEF7EC"/>
  <text x="1065" y="36" font-family="Inter, Arial" font-size="12" font-weight="bold" fill="#03543F">● System Active</text>

  <!-- Content Area -->
  
  <!-- KPI Cards -->
  <rect x="270" y="90" width="215" height="120" rx="12" fill="white" stroke="#E5E7EB"/>
  <text x="290" y="120" font-family="Inter, Arial" font-size="14" fill="#6B7280">Altitude</text>
  <text x="290" y="160" font-family="Inter, Arial" font-size="32" font-weight="bold" fill="#111827">35,000 ft</text>
  <text x="290" y="185" font-family="Inter, Arial" font-size="12" fill="#10B981">↑ 2.4% from cruise</text>

  <rect x="505" y="90" width="215" height="120" rx="12" fill="white" stroke="#E5E7EB"/>
  <text x="525" y="120" font-family="Inter, Arial" font-size="14" fill="#6B7280">Airspeed</text>
  <text x="525" y="160" font-family="Inter, Arial" font-size="32" font-weight="bold" fill="#111827">0.82 Mach</text>
  <text x="525" y="185" font-family="Inter, Arial" font-size="12" fill="#6B7280">Stable</text>

  <rect x="740" y="90" width="215" height="120" rx="12" fill="white" stroke="#E5E7EB"/>
  <text x="760" y="120" font-family="Inter, Arial" font-size="14" fill="#6B7280">Fuel Level</text>
  <text x="760" y="160" font-family="Inter, Arial" font-size="32" font-weight="bold" fill="#111827">78.4%</text>
  <rect x="760" y="175" width="175" height="6" rx="3" fill="#E5E7EB"/>
  <rect x="760" y="175" width="137" height="6" rx="3" fill="#10B981"/>

  <rect x="975" y="90" width="195" height="120" rx="12" fill="white" stroke="#E5E7EB"/>
  <text x="995" y="120" font-family="Inter, Arial" font-size="14" fill="#6B7280">Next Waypoint</text>
  <text x="995" y="160" font-family="Inter, Arial" font-size="32" font-weight="bold" fill="#3B82F6">SCR</text>
  <text x="995" y="185" font-family="Inter, Arial" font-size="12" fill="#6B7280">12.5 min remaining</text>

  <!-- Main Chart Card -->
  <rect x="270" y="235" width="600" height="340" rx="12" fill="white" stroke="#E5E7EB"/>
  <text x="295" y="270" font-family="Inter, Arial" font-size="16" font-weight="600" fill="#111827">Live Telemetry Stream</text>
  
  <path d="M 300 500 L 350 450 L 400 460 L 450 420 L 500 430 L 550 400 L 600 410 L 650 380 L 700 400 L 750 360 L 840 350" stroke="#3B82F6" stroke-width="3" fill="none"/>
  <path d="M 300 500 L 350 450 L 400 460 L 450 420 L 500 430 L 550 400 L 600 410 L 650 380 L 700 400 L 750 360 L 840 350 V 520 H 300 Z" fill="url(#paint0_linear)" fill-opacity="0.1"/>
  
  <line x1="300" y1="520" x2="840" y2="520" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="300" y1="350" x2="300" y2="520" stroke="#E5E7EB" stroke-width="1"/>
  
  <defs>
    <linearGradient id="paint0_linear" x1="570" y1="350" x2="570" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Right Side Panel -->
  <rect x="890" y="235" width="280" height="535" rx="12" fill="white" stroke="#E5E7EB"/>
  <text x="910" y="270" font-family="Inter, Arial" font-size="16" font-weight="600" fill="#111827">Crew Alerts</text>
  
  <rect x="910" y="290" width="240" height="60" rx="8" fill="#FEF2F2"/>
  <text x="920" y="315" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#991B1B">High Pressure Alert</text>
  <text x="920" y="335" font-family="Inter, Arial" font-size="11" fill="#B91C1C">Engine 1 manifold pressure...</text>

  <rect x="910" y="360" width="240" height="60" rx="8" fill="#FFFBEB"/>
  <text x="920" y="385" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#92400E">Weather Update</text>
  <text x="920" y="405" font-family="Inter, Arial" font-size="11" fill="#B45309">Light turbulence reported near...</text>

  <!-- Recent Events Table -->
  <rect x="270" y="595" width="600" height="175" rx="12" fill="white" stroke="#E5E7EB"/>
  <text x="295" y="630" font-family="Inter, Arial" font-size="16" font-weight="600" fill="#111827">System Events</text>
  
  <rect x="295" y="650" width="550" height="30" fill="#F9FAFB"/>
  <text x="305" y="670" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#4B5563">Timestamp</text>
  <text x="450" y="670" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#4B5563">Module</text>
  <text x="600" y="670" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#4B5563">Message</text>

  <text x="305" y="700" font-family="Inter, Arial" font-size="12" fill="#6B7280">14:25:32</text>
  <text x="450" y="700" font-family="Inter, Arial" font-size="12" fill="#111827">FMS-Core</text>
  <text x="600" y="700" font-family="Inter, Arial" font-size="12" fill="#111827">Route recalculation successful</text>

  <text x="305" y="730" font-family="Inter, Arial" font-size="12" fill="#6B7280">14:24:10</text>
  <text x="450" y="730" font-family="Inter, Arial" font-size="12" fill="#111827">Telemetry</text>
  <text x="600" y="730" font-family="Inter, Arial" font-size="12" fill="#111827">Speed sensor delta spike ignored</text>

</svg>
