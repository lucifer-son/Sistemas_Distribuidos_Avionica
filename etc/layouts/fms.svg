    <svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#F3F4F6"/>

  <!-- Sidebar -->
  <rect width="240" height="800" fill="#111827"/>
  <text x="30" y="50" font-family="Inter, Arial" font-size="20" font-weight="bold" fill="white">SkyNet Avionics</text>
  <text x="45" y="125" font-family="Inter, Arial" font-size="14" fill="#9CA3AF">Dashboard</text>
  <rect x="15" y="150" width="210" height="40" rx="6" fill="#1F2937"/>
  <text x="45" y="175" font-family="Inter, Arial" font-size="14" fill="white">Flight Management</text>
  <text x="45" y="225" font-family="Inter, Arial" font-size="14" fill="#9CA3AF">System Health</text>

  <!-- Top Header -->
  <rect x="240" width="960" height="64" fill="white" stroke="#E5E7EB"/>
  <text x="270" y="38" font-family="Inter, Arial" font-size="18" font-weight="600" fill="#111827">FMS - Route Planning</text>

  <!-- Route Config Card -->
  <rect x="270" y="90" width="350" height="300" rx="12" fill="white" stroke="#E5E7EB"/>
  <text x="295" y="125" font-family="Inter, Arial" font-size="16" font-weight="600" fill="#111827">New Route</text>
  
  <text x="295" y="160" font-family="Inter, Arial" font-size="12" fill="#6B7280">Origin ICAO</text>
  <rect x="295" y="170" width="300" height="40" rx="6" fill="white" stroke="#D1D5DB"/>
  <text x="310" y="195" font-family="Inter, Arial" font-size="14" fill="#111827">SBGR</text>

  <text x="295" y="235" font-family="Inter, Arial" font-size="12" fill="#6B7280">Destination ICAO</text>
  <rect x="295" y="245" width="300" height="40" rx="6" fill="white" stroke="#D1D5DB"/>
  <text x="310" y="270" font-family="Inter, Arial" font-size="14" fill="#111827">SBGL</text>

  <rect x="295" y="315" width="300" height="44" rx="6" fill="#2563EB"/>
  <text x="390" y="342" font-family="Inter, Arial" font-size="14" font-weight="600" fill="white">Calculate Route</text>

  <!-- Active Route Map View -->
  <rect x="640" y="90" width="530" height="450" rx="12" fill="#E5E7EB" stroke="#D1D5DB"/>
  <text x="665" y="125" font-family="Inter, Arial" font-size="16" font-weight="600" fill="#374151">Interactive Route Map</text>
  
  <!-- Map Placeholder (Satellite/Vector Look) -->
  <rect x="660" y="145" width="490" height="375" rx="8" fill="#CBD5E1"/>
  <path d="M 700 450 Q 850 200 1100 300" stroke="#2563EB" stroke-width="4" fill="none" stroke-dasharray="8,8"/>
  <circle cx="700" cy="450" r="8" fill="#1E40AF" stroke="white" stroke-width="2"/>
  <circle cx="1100" cy="300" r="8" fill="#B91C1C" stroke="white" stroke-width="2"/>
  <text x="700" y="480" font-family="Inter, Arial" font-size="12" font-weight="bold" fill="#1E40AF">SBGR (GRU)</text>
  <text x="1050" y="330" font-family="Inter, Arial" font-size="12" font-weight="bold" fill="#B91C1C">SBGL (GIG)</text>

  <!-- Route Details Card -->
  <rect x="270" y="410" width="350" height="130" rx="12" fill="white" stroke="#E5E7EB"/>
  <text x="295" y="445" font-family="Inter, Arial" font-size="16" font-weight="600" fill="#111827">Route Details</text>
  <text x="295" y="475" font-family="Inter, Arial" font-size="14" fill="#6B7280">Total Distance:</text>
  <text x="510" y="475" font-family="Inter, Arial" font-size="14" font-weight="bold" fill="#111827">185 NM</text>
  <text x="295" y="500" font-family="Inter, Arial" font-size="14" fill="#6B7280">Est. Flight Time:</text>
  <text x="510" y="500" font-family="Inter, Arial" font-size="14" font-weight="bold" fill="#111827">42 min</text>

  <!-- History Table -->
  <rect x="270" y="560" width="900" height="210" rx="12" fill="white" stroke="#E5E7EB"/>
  <text x="295" y="595" font-family="Inter, Arial" font-size="16" font-weight="600" fill="#111827">Route History</text>
  
  <rect x="295" y="615" width="850" height="40" fill="#F9FAFB"/>
  <text x="310" y="640" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#4B5563">Date</text>
  <text x="450" y="640" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#4B5563">Origin</text>
  <text x="600" y="640" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#4B5563">Destination</text>
  <text x="750" y="640" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#4B5563">Status</text>

  <text x="310" y="675" font-family="Inter, Arial" font-size="13" fill="#6B7280">May 23, 2026</text>
  <text x="450" y="675" font-family="Inter, Arial" font-size="13" fill="#111827">SBGR</text>
  <text x="600" y="675" font-family="Inter, Arial" font-size="13" fill="#111827">SBGL</text>
  <rect x="750" y="660" width="80" height="20" rx="10" fill="#DEF7EC"/>
  <text x="765" y="675" font-family="Inter, Arial" font-size="11" font-weight="bold" fill="#03543F">Success</text>

  <text x="310" y="705" font-family="Inter, Arial" font-size="13" fill="#6B7280">May 22, 2026</text>
  <text x="450" y="705" font-family="Inter, Arial" font-size="13" fill="#111827">SBSP</text>
  <text x="600" y="705" font-family="Inter, Arial" font-size="13" fill="#111827">SBCF</text>
  <rect x="750" y="690" width="80" height="20" rx="10" fill="#DEF7EC"/>
  <text x="765" y="705" font-family="Inter, Arial" font-size="11" font-weight="bold" fill="#03543F">Success</text>

</svg>
