[General]
network = ArquiteturaAvionica
sim-time-limit = 10s

# ==========================================================
# 1. BYPASS DE COLISÃO DO MOTOR C++
# ==========================================================
**.sameTransmissionStartTimeCheck = "ignore"
*.radioMedium.typename = "Ieee80211ScalarRadioMedium"

# Jitter de Inicialização (Impede que os nós transmitam no picossegundo zero)
**.app[*].startTime = uniform(0ms, 5ms)
**.app[*].sendInterval = uniform(4.5ms, 5.5ms)

# Configurações Automáticas de Rede IP e MAC do INET
*.configurator.dumpAddresses = true
*.configurator.dumpTopology = true
**.macAddress = "auto"
**.mac.address = "auto"
**.wlan[*].bitrate = 54Mbps
**.eth[*].bitrate = 100Mbps

# ==========================================================
# 2. CONFIGURAÇÃO DE INTERFACES WIRELESS (WAIC)
# ==========================================================
*.sensor_motor_A.numWlanInterfaces = 1
*.sensor_motor_B.numWlanInterfaces = 1
*.sensor_motor_C.numWlanInterfaces = 1
*.radar_externo.numWlanInterfaces = 1

*.accessPoint_A.numWlanInterfaces = 1
*.accessPoint_B.numWlanInterfaces = 1

# Separação estrita de Canais de Rádio para evitar interferência mútua
*.accessPoint_A.wlan[0].mgmt.typename = "Ieee80211MgmtAp"
*.accessPoint_A.wlan[0].mgmt.ssid = "Canal_Principal_WAIC"
*.accessPoint_B.wlan[0].mgmt.typename = "Ieee80211MgmtAp"
*.accessPoint_B.wlan[0].mgmt.ssid = "Canal_Redundante_WAIC"

# Apontamento dos nós clientes para as células sem fio corretas
*.sensor_motor_A.wlan[0].mgmt.typename = "Ieee80211MgmtSta"
*.sensor_motor_A.wlan[0].agent.defaultSsid = "Canal_Principal_WAIC"
*.sensor_motor_B.wlan[0].mgmt.typename = "Ieee80211MgmtSta"
*.sensor_motor_B.wlan[0].agent.defaultSsid = "Canal_Principal_WAIC"
*.sensor_motor_C.wlan[0].mgmt.typename = "Ieee80211MgmtSta"
*.sensor_motor_C.wlan[0].agent.defaultSsid = "Canal_Principal_WAIC"

*.radar_externo.wlan[0].mgmt.typename = "Ieee80211MgmtSta"
*.radar_externo.wlan[0].agent.defaultSsid = "Canal_Redundante_WAIC"

# ==========================================================
# 3. TRÁFEGO DE APLICAÇÃO (FLOW DISTRIBUTED)
# ==========================================================

# A. Sensor de Freio (Duplicando pacotes nas duas linhas AFDX)
*.sensor_freio.numApps = 2
*.sensor_freio.app[0].typename = "UdpBasicApp"
*.sensor_freio.app[0].destAddresses = "broker_mqtt"
*.sensor_freio.app[0].destPort = 1000
*.sensor_freio.app[0].messageLength = 64B

*.sensor_freio.app[1].typename = "UdpBasicApp"
*.sensor_freio.app[1].destAddresses = "broker_mqtt"
*.sensor_freio.app[1].destPort = 1001
*.sensor_freio.app[1].messageLength = 64B

# B. Sensores TMR do Motor (WAIC -> Broker)
*.sensor_motor_A.numApps = 1
*.sensor_motor_A.app[0].typename = "UdpBasicApp"
*.sensor_motor_A.app[0].destAddresses = "broker_mqtt"
*.sensor_motor_A.app[0].destPort = 1883
*.sensor_motor_A.app[0].messageLength = 64B

*.sensor_motor_B.numApps = 1
*.sensor_motor_B.app[0].typename = "UdpBasicApp"
*.sensor_motor_B.app[0].destAddresses = "broker_mqtt"
*.sensor_motor_B.app[0].destPort = 1883
*.sensor_motor_B.app[0].messageLength = 64B

*.sensor_motor_C.numApps = 1
*.sensor_motor_C.app[0].typename = "UdpBasicApp"
*.sensor_motor_C.app[0].destAddresses = "broker_mqtt"
*.sensor_motor_C.app[0].destPort = 1883
*.sensor_motor_C.app[0].messageLength = 64B

# C. Radar Meteorológico (WAIC -> Broker)
*.radar_externo.numApps = 1
*.radar_externo.app[0].typename = "UdpBasicApp"
*.radar_externo.app[0].destAddresses = "broker_mqtt"
*.radar_externo.app[0].destPort = 1884
*.radar_externo.app[0].messageLength = 128B
*.radar_externo.app[0].sendInterval = 50ms

# ==========================================================
# 4. INFRAESTRUTURA LOGICA: MIDDLEWARE & COMPUTERS
# ==========================================================

# Módulo Broker MQTT (Agrega tráfego físico e distribui para os tópicos)
*.broker_mqtt.numApps = 5
*.broker_mqtt.app[0].typename = "UdpSink"
*.broker_mqtt.app[0].localPort = 1000
*.broker_mqtt.app[1].typename = "UdpSink"
*.broker_mqtt.app[1].localPort = 1001
*.broker_mqtt.app[2].typename = "UdpSink"
*.broker_mqtt.app[2].localPort = 1883
*.broker_mqtt.app[3].typename = "UdpSink"
*.broker_mqtt.app[3].localPort = 1884
# Repassador lógico do Broker para os nós de processamento
*.broker_mqtt.app[4].typename = "UdpBasicApp"
*.broker_mqtt.app[4].destAddresses = "consenso_votador"
*.broker_mqtt.app[4].destPort = 2000
*.broker_mqtt.app[4].messageLength = 64B

# Nó de Consenso (Votador TMR do Motor)
*.consenso_votador.numApps = 2
*.consenso_votador.app[0].typename = "UdpSink"
*.consenso_votador.app[0].localPort = 2000
*.consenso_votador.app[1].typename = "UdpBasicApp"
*.consenso_votador.app[1].destAddresses = "computador_voo"
*.consenso_votador.app[1].destPort = 3000
*.consenso_votador.app[1].messageLength = 32B

# Nó de Automação FADEC (Anti-Ice Coreografia)
*.automacao_fadec.numApps = 2
*.automacao_fadec.app[0].typename = "UdpSink"
*.automacao_fadec.app[0].localPort = 1884  # Ouve diretamente a réplica do radar
*.automacao_fadec.app[1].typename = "UdpBasicApp"
*.automacao_fadec.app[1].destAddresses = "computador_voo"
*.automacao_fadec.app[1].destPort = 4000
*.automacao_fadec.app[1].messageLength = 32B

# O Core do Cockpit (Recebe dados consolidados)
*.computador_voo.numApps = 3
*.computador_voo.app[0].typename = "UdpSink"
*.computador_voo.app[0].localPort = 3000  # Dados do motor pós-consenso
*.computador_voo.app[1].typename = "UdpSink"
*.computador_voo.app[1].localPort = 4000  # Comandos do Anti-Ice
*.computador_voo.app[2].typename = "UdpBasicApp"
*.computador_voo.app[2].destAddresses = "atuador_flap"
*.computador_voo.app[2].destPort = 5000
*.computador_voo.app[2].messageLength = 32B

# Atuador Final e Caixa Preta (Flight Data Recorder)
*.atuador_flap.numApps = 1
*.atuador_flap.app[0].typename = "UdpSink"
*.atuador_flap.app[0].localPort = 5000

*.caixa_preta.numApps = 1
*.caixa_preta.app[0].typename = "UdpSink"
*.caixa_preta.app[0].localPort = 1883  # Escuta passiva do barramento bruto

# ==========================================================
# 5. ESTATÍSTICAS E EXTRAÇÃO DE MÉTRICAS PARA O ARTIGO
# ==========================================================
**.scalar-recording = true
**.vector-recording = true

# Bloqueio de logs secundários do Mac/Radio para evitar estouro de pilha C++ (Cura cObject)
**.wlan[*].mac.dcf.channelAccess.contention.*.record = false
**.wlan[*].mac.*.vector-recording = false
**.wlan[*].radio.*.vector-recording = false

# Monitoramento de desempenho fim-a-fim focado no Cockpit
**.computador_voo.app[*].packetReceived:count.record = true
**.computador_voo.app[*].endToEndDelay:vector.record = true
**.computador_voo.app[*].endToEndDelay:histogram.record = true
